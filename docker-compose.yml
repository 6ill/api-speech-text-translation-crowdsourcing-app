  # # 5. WORKER PRIORITAS TINGGI (INFERENCE)
  # worker_inference:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   command: celery -A src.celery_app.app worker --loglevel=info -Q inference_queue --concurrency=2
  #   env_file: .env
  #   depends_on:
  #     - redis
