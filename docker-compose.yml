  # # 6. WORKER PRIORITAS RENDAH (PIPELINE)
  # worker_pipeline:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   command: celery -A src.celery_app.app worker --loglevel=info -Q ml_pipeline_queue --concurrency=1
  #   env_file: .env
  #   depends_on:
